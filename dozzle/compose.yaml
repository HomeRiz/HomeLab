version: '3.8'

services:
  dozzle:
    container_name: homelab-dozzle
    image: amir20/dozzle:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      DOZZLE_LEVEL: ${DOZZLE_LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9998:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network

networks:
  homelab-network:
    external: true
    name: homelab-network
