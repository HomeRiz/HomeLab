services:
  crowdsec:
    container_name: homelab-crowdsec
    image: crowdsecurity/crowdsec:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/sshd crowdsecurity/nginx"
    volumes:
      - ./config:/etc/crowdsec
      - ./data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro
    ports:
      - "8080:8080"
      - "6060:6060"
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network

  crowdsec-firewall-bouncer:
    container_name: homelab-crowdsec-bouncer
    image: crowdsecurity/firewall-bouncer:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      CROWDSEC_LAPI_URL: ${CROWDSEC_BOUNCER_LAPI_URL}
      CROWDSEC_LAPI_KEY: ${CROWDSEC_BOUNCER_API_KEY}
    volumes:
      - ./bouncer-config:/etc/crowdsec-firewall-bouncer
    networks:
      - homelab-network
    depends_on:
      crowdsec:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
