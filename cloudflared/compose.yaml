version: '3.8'

services:
  cloudflared:
    container_name: homelab-cloudflared
    image: cloudflare/cloudflared:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./config:/etc/cloudflared
      - ./data:/app/data
    command: tunnel --config /etc/cloudflared/config.yaml run ${CLOUDFLARED_TUNNEL_NAME}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info", "${CLOUDFLARED_TUNNEL_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network
    depends_on:
      caddy:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
