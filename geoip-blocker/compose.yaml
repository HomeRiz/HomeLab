services:
  geoip-blocker:
    container_name: homelab-geoip-blocker
    image: crazymax/geoip-blocker:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./data:/data
      - ./config:/etc/geoip-blocker
    ports:
      - "6061:6060"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6060/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network
    depends_on:
      docker-proxy:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
