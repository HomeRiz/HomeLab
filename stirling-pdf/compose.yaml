services:
  stirling-pdf:
    container_name: homelab-stirling-pdf
    image: frooodle/stirling-pdf:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      LOG_LEVEL: ${STIRLING_LOG_LEVEL:-info}
    volumes:
      - ./config:/configs
      - ./data:/data
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network

networks:
  homelab-network:
    external: true
    name: homelab-network
