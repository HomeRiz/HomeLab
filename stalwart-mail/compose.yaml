version: '3.8'

services:
  stalwart-mail:
    container_name: homelab-stalwart-mail
    image: stalwartlabs/stalwart-mail:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./config:/etc/stalwart-mail
      - ./data:/var/lib/stalwart-mail
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "110:110"
      - "995:995"
      - "143:143"
      - "993:993"
      - "4190:4190"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
