services:
  crowdsec-console:
    container_name: homelab-crowdsec-console
    image: crowdsecurity/crowdsec-remediation-engine:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./config:/etc/crowdsec
      - ./data:/var/lib/crowdsec/data
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network
    depends_on:
      crowdsec:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
