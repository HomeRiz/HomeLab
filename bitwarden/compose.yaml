version: '3.8'

services:
  bitwarden:
    container_name: homelab-bitwarden
    image: bitwarden/self-host:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      ASPNETCORE_ENVIRONMENT: Production
      CORE_DOMAIN: ${BITWARDEN_DOMAIN}
      CORE_ATTACHMENT_DISK_ENCRYPTION_KEY: ${BITWARDEN_ATTACHMENT_KEY}
      CORE_ENCRYPTION_KEY: ${BITWARDEN_ENCRYPTION_KEY}
      CORE_LOG_LEVEL: Information
      IDENTITY_IDENTITYCERTTHUMBPRINT: ${BITWARDEN_CERT_THUMBPRINT}
      ADMIN_DELETION_TOKEN: ${BITWARDEN_DELETION_TOKEN}
    volumes:
      - ./data:/etc/bitwarden
    ports:
      - "8888:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network

networks:
  homelab-network:
    external: true
    name: homelab-network
