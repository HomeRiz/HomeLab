version: '3.8'

services:
  netbird-management:
    container_name: homelab-netbird-management
    image: netbirdio/netbird-management:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./data:/etc/netbird
    ports:
      - "33073:33073"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:33073/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network

  netbird-signal:
    container_name: homelab-netbird-signal
    image: netbirdio/netbird-signal:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    ports:
      - "51820:51820/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network
    depends_on:
      netbird-management:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
