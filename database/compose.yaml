services:
  postgres:
    container_name: homelab-postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_DB}
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER} -d ${DB_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab-network

  redis:
    container_name: homelab-redis
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${DB_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab-network

volumes:
  postgres_data:
  redis_data:

networks:
  homelab-network:
    external: true
    name: homelab-network
