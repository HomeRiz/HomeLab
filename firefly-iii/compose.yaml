version: '3.8'

services:
  firefly-iii:
    container_name: homelab-firefly-iii
    image: fireflyiii/core:latest
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      APP_KEY: ${FIREFLY_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_FIREFLY_DB}
      DB_USERNAME: ${DB_FIREFLY_USER}
      DB_PASSWORD: ${DB_FIREFLY_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DB_REDIS_PASSWORD}
      REDIS_DB: 0
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  homelab-network:
    external: true
    name: homelab-network
